server {
    listen 80;

    location /socket.io/ {
        proxy_pass         http://uptime-kuma:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /rex-theme.css {
        alias /etc/nginx/rex-theme.css;
        add_header Content-Type "text/css; charset=utf-8";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /rex-layout.js {
        alias /etc/nginx/rex-layout.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        proxy_pass         http://uptime-kuma:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # 1. Inject CSS loader (always last in head, wins cascade)
        # 2. Inject rex-layout.js (builds the new UI after Vue mounts)
        sub_filter '</head>' '<script>
(function(){
  function loadCSS(){
    var o=document.getElementById("rz-theme");
    if(o)o.remove();
    var l=document.createElement("link");
    l.id="rz-theme";l.rel="stylesheet";
    l.href="/rex-theme.css?t="+Date.now();
    document.head.appendChild(l);
  }
  loadCSS();
  new MutationObserver(function(ms){
    ms.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.id==="rz-theme")return;
        if(n.tagName==="STYLE"||(n.tagName==="LINK"&&n.rel==="stylesheet"))
          setTimeout(loadCSS,0);
      });
    });
  }).observe(document.documentElement,{subtree:true,childList:true});
})();
</script><script src="/rex-layout.js?v=4"></script></head>';

        sub_filter_once on;
        sub_filter_types text/html;
    }
}
