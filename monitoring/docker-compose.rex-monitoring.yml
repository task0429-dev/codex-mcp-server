# Rex Monitoring Stack (Containerized, Persistent)

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: task-project-monitor
    restart: unless-stopped
    # Port is internal only — nginx-theme handles the public port
    expose:
      - "3001"
    volumes:
      - ../data/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 90s

  nginx-theme:
    image: nginx:alpine
    container_name: rex-kuma-theme
    restart: unless-stopped
    ports:
      - "3011:80"
    volumes:
      - ./nginx-inject.conf:/etc/nginx/conf.d/default.conf:ro
      - ./rex-command-zone.css:/etc/nginx/rex-theme.css:ro
      - ./rex-layout.js:/etc/nginx/rex-layout.js:ro
    depends_on:
      - uptime-kuma

  rex-monitor-ops:
    build:
      context: ..
      dockerfile: monitoring/Dockerfile.ops
    container_name: rex-monitor-ops
    restart: unless-stopped
    depends_on:
      uptime-kuma:
        condition: service_healthy
    env_file:
      - ./rex-monitoring-stack.env
    volumes:
      - ../monitoring:/app/monitoring
      - ../scripts/heartbeat:/app/scripts/heartbeat
