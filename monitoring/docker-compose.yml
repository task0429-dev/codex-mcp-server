services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: rex-monitoring-kuma
    restart: unless-stopped
    expose:
      - "3001"
    ports:
      - "3011:3001"
    volumes:
      - ./docker-data/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 90s

  nginx-theme:
    image: nginx:alpine
    container_name: rex-monitoring-theme
    restart: unless-stopped
    ports:
      - "3012:80"
    volumes:
      - ./nginx-inject.conf:/etc/nginx/conf.d/default.conf:ro
      - ./rex-command-zone.css:/etc/nginx/rex-theme.css:ro
      - ./rex-layout.js:/etc/nginx/rex-layout.js:ro
    depends_on:
      - uptime-kuma

  rex-monitor-ops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rex-monitoring-ops
    restart: unless-stopped
    depends_on:
      uptime-kuma:
        condition: service_healthy
    env_file:
      - ./rex-monitoring-stack.env
    environment:
      REX_HEARTBEAT_EXPORT_PATH: /app/docker-data/ops/rex-heartbeat-map.generated.json
      REX_DAEMON_STATUS_FILE: /app/docker-data/ops/rex-monitoring-daemon-status.json
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    volumes:
      - ./docker-data/ops:/app/docker-data/ops
      - ./rex-monitor-inventory.json:/app/rex-monitor-inventory.json:ro

  monitoring-public-c2:
    image: cloudflare/cloudflared:latest
    container_name: rex-monitoring-public-c2
    restart: unless-stopped
    profiles:
      - public-c2
    depends_on:
      - nginx-theme
    command:
      - tunnel
      - --url
      - http://nginx-theme:80
      - --no-autoupdate
